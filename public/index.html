<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Royal Ludo Arena</title>
    <meta
      name="description"
      content="Realtime multiplayer Ludo where players can create and join private servers."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Sora:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="background-layer" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="app-header">
        <h1>Royal Ludo Arena</h1>
        <p>Create a server, share the code, and play live with friends.</p>
      </header>

      <main class="app-main">
        <section id="lobbySection" class="card">
          <div class="forms-grid">
            <form id="createForm" class="panel">
              <h2>Create Server</h2>
              <label>
                Your Name
                <input
                  id="createNameInput"
                  type="text"
                  maxlength="20"
                  placeholder="Enter your name"
                  required
                />
              </label>
              <label>
                Match Type
                <select id="modeSelect" required>
                  <option value="2">1v1 (2 players)</option>
                  <option value="3">1v1v1 (3 players)</option>
                  <option value="4">1v1v1v1 (4 players)</option>
                </select>
              </label>
              <button type="submit" class="btn btn-primary">Create Server</button>
            </form>

            <form id="joinForm" class="panel">
              <h2>Join Server</h2>
              <label>
                Your Name
                <input
                  id="joinNameInput"
                  type="text"
                  maxlength="20"
                  placeholder="Enter your name"
                  required
                />
              </label>
              <label>
                Room Code
                <input
                  id="joinCodeInput"
                  type="text"
                  maxlength="5"
                  placeholder="ABCDE"
                  required
                />
              </label>
              <button type="submit" class="btn btn-primary">Join Server</button>
            </form>
          </div>
        </section>

        <section id="roomSection" class="card hidden">
          <div class="room-top">
            <div>
              <h2>
                Server: <span id="roomCodeText" class="mono">-----</span>
              </h2>
              <p id="roomMetaText"></p>
            </div>
            <div class="row-actions">
              <button id="copyCodeBtn" type="button" class="btn btn-secondary">
                Copy Code
              </button>
              <button id="leaveRoomBtn" type="button" class="btn btn-ghost">
                Leave
              </button>
            </div>
          </div>

          <div class="room-body">
            <div>
              <h3>Players</h3>
              <ul id="playerList" class="player-list"></ul>
            </div>
            <div class="host-box">
              <button
                id="startGameBtn"
                type="button"
                class="btn btn-primary full"
              >
                Start Match
              </button>
              <p id="startHintText"></p>
            </div>
          </div>
        </section>

        <section id="gameSection" class="card hidden">
          <div class="game-grid">
            <div id="boardWrap" class="board-wrap">
              <canvas id="boardCanvas" aria-label="Ludo board"></canvas>
            </div>

            <aside class="side-panel">
              <div class="status-grid">
                <div class="status-cell">
                  <span>Turn</span>
                  <strong id="turnText">-</strong>
                </div>
                <div class="status-cell">
                  <span>Dice</span>
                  <strong id="diceText">-</strong>
                </div>
              </div>

              <div id="winnerBanner" class="winner-banner hidden"></div>

              <button id="rollDiceBtn" type="button" class="btn btn-accent full">
                Roll Dice
              </button>

              <div>
                <h3>Your Tokens</h3>
                <p class="hint-text">
                  Move by clicking a highlighted token on board or from this list.
                </p>
                <div id="tokenButtons" class="token-buttons"></div>
              </div>

              <div class="log-wrap">
                <h3>Match Log</h3>
                <ul id="logList" class="log-list"></ul>
              </div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
